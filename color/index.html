<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pastel Hue Swipe</title>
  <style>
    :root {
      --hue: 180;
      --sat: 58%;
      --light: 82%;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      background: hsl(var(--hue) var(--sat) var(--light));
      transition: background-color 180ms linear;
    }
  </style>
</head>

<body>
  <script>
    let hue = Math.floor(Math.random() * 360);
    const sat = 70;
    const light = 82;

    const state = {
      startY: null,
      isMouseDown: false,
      lastMouseY: null,
      lastTapMs: 0,
      autoShift: false,
      rafId: null,
      lastFrameMs: 0
    };

    function wrapHue(value) {
      return ((value % 360) + 360) % 360;
    }

    function render() {
      document.documentElement.style.setProperty("--hue", String(hue));
      document.documentElement.style.setProperty("--sat", sat + "%");
      document.documentElement.style.setProperty("--light", light + "%");
    }

    function shiftHue(delta) {
      hue = wrapHue(hue + delta);
      render();
    }

    function animate(ms) {
      if (!state.autoShift) {
        state.rafId = null;
        state.lastFrameMs = 0;
        return;
      }

      if (state.lastFrameMs === 0) {
        state.lastFrameMs = ms;
      }

      const dt = ms - state.lastFrameMs;
      state.lastFrameMs = ms;

      // Slow continuous shift at ~8 degrees per second.
      shiftHue((dt / 1000) * 30);
      state.rafId = requestAnimationFrame(animate);
    }

    function toggleAutoShift() {
      state.autoShift = !state.autoShift;

      if (state.autoShift && state.rafId == null) {
        state.rafId = requestAnimationFrame(animate);
      }

      if (!state.autoShift && state.rafId != null) {
        cancelAnimationFrame(state.rafId);
        state.rafId = null;
        state.lastFrameMs = 0;
      }
    }

    document.addEventListener("touchstart", (event) => {
      if (event.touches.length > 0) {
        state.startY = event.touches[0].clientY;
      }

      const now = Date.now();
      if (now - state.lastTapMs < 300) {
        toggleAutoShift();
      }
      state.lastTapMs = now;
    }, { passive: true });

    document.addEventListener("touchend", (event) => {
      if (state.startY == null || event.changedTouches.length === 0) {
        return;
      }

      const endY = event.changedTouches[0].clientY;
      const deltaY = endY - state.startY;
      state.startY = null;

      if (Math.abs(deltaY) < 24) {
        return;
      }

      // Swipe up increases hue, swipe down decreases hue.
      const step = 16;
      shiftHue(deltaY < 0 ? step : -step);
    }, { passive: true });


    document.addEventListener("mousedown", (event) => {
      state.isMouseDown = true;
      state.lastMouseY = event.clientY;
    });

    document.addEventListener("mousemove", (event) => {
      if (!state.isMouseDown || state.lastMouseY == null) {
        return;
      }

      const deltaY = event.clientY - state.lastMouseY;
      state.lastMouseY = event.clientY;

      // Drag up increases hue, drag down decreases hue.
      shiftHue(-deltaY * .25);
    });

    document.addEventListener("mouseup", () => {
      state.isMouseDown = false;
      state.lastMouseY = null;
    });

    document.addEventListener("mouseleave", () => {
      state.isMouseDown = false;
      state.lastMouseY = null;
    });

    document.addEventListener("dblclick", () => {
      toggleAutoShift();
    });

    render();
  </script>
</body>

</html>
