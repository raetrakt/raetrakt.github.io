<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Witzfindig – Random Image Combiner</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0b0c;
      color: #e8e8ea;
      overflow-x: hidden;
      /* prevent accidental horizontal scrolling on mobile */
    }

    .wrap {
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 12px;
      box-sizing: border-box;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    header small {
      opacity: .75;
    }

    .stage {
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 10px;
      background: #0f0f12;

      /* critical for CSS Grid: allow the 1fr row to actually shrink */
      min-height: 0;
      min-width: 0;
      position: relative;
    }

    canvas {
      display: block;
      background: #111;
      image-rendering: auto;

      /* safety net (JS still sets explicit CSS size) */
      max-width: 100%;
      max-height: 100%;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
      /* allow children to shrink (important in flex layouts) */
    }

    .controls .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, .16);
      background: #17171b;
      color: #e8e8ea;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .meta {
      font-size: 12px;
      opacity: .8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      min-width: 0;
      /* prevents long text from forcing horizontal overflow */
    }

    a {
      color: inherit;
    }

    .batch-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
    }

    .batch-grid[hidden] {
      display: none;
    }

    .batch-tile {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, .16);
      background: #17171b;
      border-radius: 8px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .batch-tile canvas {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: #111;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <div style="font-weight:600;">Witzfindig V1</div>
        <small>Loads all images from <code>/bilder_v1/**</code></small>
      </div>
      <small id="status">Loading…</small>
    </header>

    <div class="stage" id="stage">
      <canvas id="c" aria-label="combined image canvas"></canvas>
      <div id="batchGrid" class="batch-grid" hidden aria-label="batch preview grid"></div>
    </div>

    <div class="controls">
      <div class="btns">
        <button id="btnNew" disabled>New image</button>
        <button id="btnPrev" disabled>Previous image</button>
        <button id="btnSave" disabled>Save image</button>
        <button id="btnSaveBoth" disabled>Save both images</button>
        <button id="btnBatch" disabled>Generate batch</button>
        <button id="btnBackBatch" disabled>Back to batch</button>

        <!-- Arrow controls for A -->
        <button id="btnAUp" title="Move A up" aria-label="Move A up">A ▲</button>
        <button id="btnALeft" title="Move A left" aria-label="Move A left">A ◀</button>
        <button id="btnARight" title="Move A right" aria-label="Move A right">A ▶</button>
        <button id="btnADown" title="Move A down" aria-label="Move A down">A ▼</button>
        <!-- Zoom controls for A -->
        <button id="btnAZoomIn" title="Zoom A in" aria-label="Zoom A in">A +</button>
        <button id="btnAZoomOut" title="Zoom A out" aria-label="Zoom A out">A −</button>

        <!-- Arrow controls for B -->
        <button id="btnBUp" title="Move B up" aria-label="Move B up">B ▲</button>
        <button id="btnBLeft" title="Move B left" aria-label="Move B left">B ◀</button>
        <button id="btnBRight" title="Move B right" aria-label="Move B right">B ▶</button>
        <button id="btnBDown" title="Move B down" aria-label="Move B down">B ▼</button>
        <!-- Zoom controls for B -->
        <button id="btnBZoomIn" title="Zoom B in" aria-label="Zoom B in">B +</button>
        <button id="btnBZoomOut" title="Zoom B out" aria-label="Zoom B out">B −</button>
      </div>
      <div class="meta" id="meta" title=""></div>
    </div>
  </div>

  <script>
    // --- Config ---
    const ROOT_DIR = "bilder_v1"; // (kept only if you want to validate paths; otherwise safe to remove)
    const IMAGE_EXT_RE = /\.(png|jpe?g|webp)$/i;
    const MANIFEST_URL = "./manifest.json"; // generated + committed
    const MAX_SAVE_LONG_SIDE = 2000; // px: limit downloaded image long edge
    const MOVE_STEP = 10; // pixels per arrow click
    const ZOOM_STEP = 1.15; // multiply scale by this for zoom in, divide for zoom out
    const CUT_STEP = 0.01; // fraction to move cut per key press

    const $ = (id) => document.getElementById(id);
    const canvas = $("c");
    const ctx = canvas.getContext("2d", { alpha: false });

    const statusEl = $("status");
    const metaEl = $("meta");
    const btnNew = $("btnNew");
    const btnPrev = $("btnPrev");
    const btnSave = $("btnSave");
    const btnSaveBoth = $("btnSaveBoth");
    const btnBatch = $("btnBatch");
    const btnBackBatch = $("btnBackBatch");
    const batchGrid = $("batchGrid");
    const btnAUp = $("btnAUp");
    const btnADown = $("btnADown");
    const btnALeft = $("btnALeft");
    const btnARight = $("btnARight");
    const btnAZoomIn = $("btnAZoomIn");
    const btnAZoomOut = $("btnAZoomOut");
    const btnBUp = $("btnBUp");
    const btnBDown = $("btnBDown");
    const btnBLeft = $("btnBLeft");
    const btnBRight = $("btnBRight");
    const btnBZoomIn = $("btnBZoomIn");
    const btnBZoomOut = $("btnBZoomOut");

    const state = {
      allImages: /** @type {string[]} */ ([]),   // same-origin URLs like "/bilder_v1/sub/a.jpg"
      // history entries now also keep pixel offsets for each image
      history: /** @type {Array<{a:string,b:string,dir:"v"|"h",cut:number,ax?:number,ay?:number,bx?:number,by?:number}>} */ ([]),
      index: -1,
      lastRender: null,
      busy: false,
      batchMode: false,
      hasBatch: false,
    };

    function setStatus(msg) { statusEl.textContent = msg; }

    function sanitizeFilenamePart(s) {
      return s
        .replace(/^\/+/, "")
        .replace(/[\/\\]+/g, "__")
        .replace(/[^a-zA-Z0-9._-]+/g, "-")
        .replace(/-+/g, "-")
        .slice(0, 160);
    }

    function normalizeImagePath(u) {
      // Prefer storing pathnames ("/bilder_v1/...") for clean metadata + filenames.
      try {
        const url = new URL(u, location.href);
        return url.pathname;
      } catch {
        const s = String(u || "");
        if (s.startsWith("/")) return s;
        return "/" + s.replace(/^\.?\//, "");
      }
    }

    function pickTwoDistinct(arr) {
      const a = arr[Math.floor(Math.random() * arr.length)];
      let b = a;
      if (arr.length > 1) {
        while (b === a) b = arr[Math.floor(Math.random() * arr.length)];
      }
      return [a, b];
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.decoding = "async";
        img.loading = "eager";
        img.crossOrigin = "anonymous"; // safe for same-origin; helps if you switch to raw URLs
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Failed to load: " + url));
        img.src = url;
      });
    }

    function drawImageNoStretch(
      ctx,
      img,
      destW,
      destH,
      { allowUpscale = true, fit = "cover", offsetX = 0, offsetY = 0, userScale = 1 } = {}
    ) {
      const sw = img.naturalWidth || img.width || 1;
      const sh = img.naturalHeight || img.height || 1;

      // contain = no crop, possible empty bars
      // cover   = fills destination, possible crop
      let scale =
        fit === "contain"
          ? Math.min(destW / sw, destH / sh)
          : Math.max(destW / sw, destH / sh);

      if (!allowUpscale) scale = Math.min(scale, 1);

      // apply user-controlled scale multiplier (zoom)
      const dw = Math.max(1, Math.round(sw * scale * userScale));
      const dh = Math.max(1, Math.round(sh * scale * userScale));
      const dx = Math.floor((destW - dw) / 2) + Math.round(offsetX);
      const dy = Math.floor((destH - dh) / 2) + Math.round(offsetY);

      ctx.drawImage(img, 0, 0, sw, sh, dx, dy, dw, dh);
    }

    function fitCanvasCSS() {
      // Portrait viewport => prefer fit-by-width.
      // Landscape viewport => prefer fit-by-height.
      const stage = $("stage");

      const w = canvas.width || 1;
      const h = canvas.height || 1;

      const containerW = stage.clientWidth || 1;
      const containerH = stage.clientHeight || 1;

      const portraitViewport = window.innerHeight >= window.innerWidth;

      let scale;
      if (portraitViewport) {
        scale = containerW / w;           // fit by width
        if (h * scale > containerH) scale = containerH / h; // fallback to fit by height
      } else {
        scale = containerH / h;           // fit by height
        if (w * scale > containerW) scale = containerW / w; // fallback to fit by width
      }

      const cssW = Math.max(1, Math.floor(w * scale));
      const cssH = Math.max(1, Math.floor(h * scale));

      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
    }

    function showSingleView() {
      state.batchMode = false;
      batchGrid.hidden = true;
      canvas.style.display = "block";
    }

    function showBatchView() {
      state.batchMode = true;
      canvas.style.display = "none";
      batchGrid.hidden = false;
    }

    function backToBatch() {
      if (!state.hasBatch || !batchGrid.children.length) return;
      showBatchView();
      setStatus("Batch view");
      updateButtons();
    }

    async function renderComboPreviewToCanvas(combo, outCanvas) {
      const [imgA, imgB] = await Promise.all([loadImage(combo.a), loadImage(combo.b)]);

      // Render exactly like main canvas first (full-size combo)
      const baseW = imgA.naturalWidth || imgA.width || 1;
      const baseH = imgA.naturalHeight || imgA.height || 1;

      const full = document.createElement("canvas");
      full.width = baseW;
      full.height = baseH;
      const fctx = full.getContext("2d", { alpha: false });
      fctx.imageSmoothingEnabled = true;
      fctx.imageSmoothingQuality = "high";

      fctx.fillStyle = "#111";
      fctx.fillRect(0, 0, baseW, baseH);

      const ax = Math.round(combo.ax || 0);
      const ay = Math.round(combo.ay || 0);
      const aScale = typeof combo.axScale === "number" ? combo.axScale : 1;
      drawImageNoStretch(fctx, imgA, baseW, baseH, { allowUpscale: true, fit: "cover", offsetX: ax, offsetY: ay, userScale: aScale });

      const bx = Math.round(combo.bx || 0);
      const by = Math.round(combo.by || 0);
      const bScale = typeof combo.bxScale === "number" ? combo.bxScale : 1;

      if (combo.dir === "v") {
        const x = Math.floor(baseW * combo.cut);
        fctx.save();
        fctx.beginPath();
        fctx.rect(x, 0, baseW - x, baseH);
        fctx.clip();
        drawImageNoStretch(fctx, imgB, baseW, baseH, { allowUpscale: true, fit: "cover", offsetX: bx, offsetY: by, userScale: bScale });
        fctx.restore();
      } else {
        const y = Math.floor(baseH * combo.cut);
        fctx.save();
        fctx.beginPath();
        fctx.rect(0, y, baseW, baseH - y);
        fctx.clip();
        drawImageNoStretch(fctx, imgB, baseW, baseH, { allowUpscale: true, fit: "cover", offsetX: bx, offsetY: by, userScale: bScale });
        fctx.restore();
      }

      // Scale down to preview size while preserving aspect ratio.
      const PREVIEW_MAX_W = 320;
      const PREVIEW_MAX_H = 180;
      const s = Math.min(PREVIEW_MAX_W / baseW, PREVIEW_MAX_H / baseH, 1);
      const displayW = Math.max(1, Math.round(baseW * s));
      const displayH = Math.max(1, Math.round(baseH * s));

      // Render at higher internal resolution for less pixelation.
      const renderScale = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const renderW = Math.max(1, Math.round(displayW * renderScale));
      const renderH = Math.max(1, Math.round(displayH * renderScale));

      outCanvas.width = renderW;
      outCanvas.height = renderH;
      outCanvas.style.width = displayW + "px";
      outCanvas.style.height = displayH + "px";

      const outCtx = outCanvas.getContext("2d", { alpha: false });
      outCtx.imageSmoothingEnabled = true;
      outCtx.imageSmoothingQuality = "high";
      outCtx.fillStyle = "#111";
      outCtx.fillRect(0, 0, renderW, renderH);
      outCtx.drawImage(full, 0, 0, renderW, renderH);
    }

    async function generateBatch() {
      if (state.allImages.length < 2) return;

      state.busy = true;
      updateButtons();
      try {
        setStatus("Generating batch…");
        batchGrid.innerHTML = "";

        const combos = Array.from({ length: 18 }, () => makeRandomCombo());

        for (let i = 0; i < combos.length; i++) {
          const combo = combos[i];
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = "batch-tile";
          tile.title = `Open #${i + 1}`;

          const tileCanvas = document.createElement("canvas");
          tile.appendChild(tileCanvas);

          tile.onclick = () => {
            const chosen = Object.assign({}, combo);
            state.history = state.history.slice(0, state.index + 1);
            state.history.push(chosen);
            state.index = state.history.length - 1;
            renderCombo(chosen).catch(showError);
          };

          batchGrid.appendChild(tile);
          await renderComboPreviewToCanvas(combo, tileCanvas);
        }

        state.hasBatch = true;
        showBatchView();
        setStatus("Generated 18 combinations (6×3)");
      } finally {
        state.busy = false;
        updateButtons();
      }
    }

    async function renderCombo(combo) {
      state.busy = true;
      updateButtons();

      try {
        showSingleView();
        const [imgA, imgB] = await Promise.all([loadImage(combo.a), loadImage(combo.b)]);

        const w = imgA.naturalWidth || imgA.width;
        const h = imgA.naturalHeight || imgA.height;
        canvas.width = w;
        canvas.height = h;

        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, w, h);

        // Draw A scaled to output (apply A offsets and A scale if any).
        const ax = Math.round(combo.ax || 0);
        const ay = Math.round(combo.ay || 0);
        const aScale = typeof combo.axScale === "number" ? combo.axScale : 1;
        drawImageNoStretch(ctx, imgA, w, h, { allowUpscale: true, fit: "cover", offsetX: ax, offsetY: ay, userScale: aScale });

        // IMPORTANT: clip in DESTINATION space, then draw B scaled to output.
        // This avoids "empty slice" when B's dimensions differ from A.
        const cut = combo.cut;

        if (combo.dir === "v") {
          const x = Math.floor(w * cut);
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, 0, w - x, h);
          ctx.clip();

          // apply B offsets (in destination pixels)
          const bx = Math.round(combo.bx || 0);
          const by = Math.round(combo.by || 0);
          const bScale = typeof combo.bxScale === "number" ? combo.bxScale : 1;
          drawImageNoStretch(ctx, imgB, w, h, { allowUpscale: true, fit: "cover", offsetX: bx, offsetY: by, userScale: bScale });

          ctx.restore();
        } else {
          const y = Math.floor(h * cut);
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, y, w, h - y);
          ctx.clip();

          const bx = Math.round(combo.bx || 0);
          const by = Math.round(combo.by || 0);
          const bScale = typeof combo.bxScale === "number" ? combo.bxScale : 1;
          drawImageNoStretch(ctx, imgB, w, h, { allowUpscale: true, fit: "cover", offsetX: bx, offsetY: by, userScale: bScale });

          ctx.restore();
        }

        state.lastRender = combo;

        const meta = `${combo.dir === "v" ? "vertical" : "horizontal"} cut @ ${(combo.cut * 100).toFixed(1)}%  |  A: ${combo.a}  +  B: ${combo.b}`;
        metaEl.textContent = meta;
        metaEl.title = meta;

        fitCanvasCSS();
      } finally {
        state.busy = false;
        updateButtons();
      }
    }

    function makeRandomCombo() {
      const [a, b] = pickTwoDistinct(state.allImages);
      const dir = Math.random() < 0.5 ? "v" : "h";
      const cut = (1 / 3) + Math.random() * (1 / 3); // between 1/3 and 2/3
      // initialize offsets and scales to defaults
      return { a, b, dir, cut, ax: 0, ay: 0, bx: 0, by: 0, axScale: 1, bxScale: 1 };
    }

    // Zoom one of the images by multiplying its scale and re-render.
    async function zoomImage(which, factor) {
      if (state.index < 0) return;
      const combo = Object.assign({}, state.history[state.index]);
      if (which === "a") {
        combo.axScale = (combo.axScale || 1) * factor;
      } else {
        combo.bxScale = (combo.bxScale || 1) * factor;
      }
      state.history[state.index] = combo;
      await renderCombo(combo);
    }

    // Clamp utility
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // Adjust current combo cut by a fraction (positive -> move right/down, negative -> left/up)
    async function adjustCut(delta) {
      if (state.index < 0) return;
      const combo = Object.assign({}, state.history[state.index]);
      combo.cut = clamp((combo.cut || 0.5) + delta, 0.02, 0.98);
      state.history[state.index] = combo;
      await renderCombo(combo);
    }

    // Restore missing navigation functions
    async function newImage() {
      if (state.allImages.length < 2) return;

      // If we're not at the end of the stack, "New image" becomes "Next image".
      if (state.index >= 0 && state.index < state.history.length - 1) {
        state.index += 1;
        await renderCombo(state.history[state.index]);
        return;
      }

      // Otherwise, generate a brand new combo and append to history.
      const combo = makeRandomCombo();
      state.history.push(combo);
      state.index = state.history.length - 1;
      await renderCombo(combo);
    }

    async function prevImage() {
      if (state.index <= 0) return;
      state.index -= 1;
      await renderCombo(state.history[state.index]);
    }

    // Move one of the images by dx/dy pixels (updates history + re-renders)
    async function moveImage(which, dx, dy) {
      if (state.index < 0) return;
      const combo = Object.assign({}, state.history[state.index]);
      if (which === "a") {
        combo.ax = (combo.ax || 0) + dx;
        combo.ay = (combo.ay || 0) + dy;
      } else {
        combo.bx = (combo.bx || 0) + dx;
        combo.by = (combo.by || 0) + dy;
      }
      state.history[state.index] = combo;
      // render updated combo
      await renderCombo(combo);
    }

    // Keyboard controls: WASD -> image A, Arrow keys -> image B
    function handleKeyDown(e) {
      if (!state.lastRender || state.busy || state.batchMode) return;
      const step = MOVE_STEP;
      switch (e.key) {
      // Space -> new/next image
      case " ":
      case "Spacebar": // legacy
        e.preventDefault();
        newImage().catch(showError);
        break;
        // Move cut: 'y' decrease cut (left/top), 'x' increase cut (right/bottom)
        case "y":
        case "Y":
          e.preventDefault();
          adjustCut(-CUT_STEP).catch(showError);
          break;
        case "x":
        case "X":
          e.preventDefault();
          adjustCut(CUT_STEP).catch(showError);
          break;
        case "w":
        case "W":
          e.preventDefault();
          moveImage("a", 0, -step).catch(showError);
          break;
        case "a":
        case "A":
          e.preventDefault();
          moveImage("a", -step, 0).catch(showError);
          break;
        case "s":
        case "S":
          e.preventDefault();
          moveImage("a", 0, step).catch(showError);
          break;
        case "d":
        case "D":
          e.preventDefault();
          moveImage("a", step, 0).catch(showError);
          break;
        case "ArrowUp":
          e.preventDefault();
          moveImage("b", 0, -step).catch(showError);
          break;
        case "ArrowLeft":
          e.preventDefault();
          moveImage("b", -step, 0).catch(showError);
          break;
        case "ArrowDown":
          e.preventDefault();
          moveImage("b", 0, step).catch(showError);
          break;
        case "ArrowRight":
          e.preventDefault();
          moveImage("b", step, 0).catch(showError);
          break;
      }
    }

    function updateButtons() {
      btnPrev.disabled = state.index <= 0 || state.busy;
      btnNew.disabled = state.allImages.length < 2 || state.busy;
      btnSave.disabled = !state.lastRender || state.busy || state.batchMode;
      btnSaveBoth.disabled = !state.lastRender || state.busy || state.batchMode;
      btnBatch.disabled = state.allImages.length < 2 || state.busy;
      btnBackBatch.disabled = state.busy || state.batchMode || !state.hasBatch || !batchGrid.children.length;

      const arrowsDisabled = !state.lastRender || state.busy || state.batchMode;
      btnAUp.disabled = arrowsDisabled;
      btnADown.disabled = arrowsDisabled;
      btnALeft.disabled = arrowsDisabled;
      btnARight.disabled = arrowsDisabled;
      // zoom A
      btnAZoomIn.disabled = arrowsDisabled;
      btnAZoomOut.disabled = arrowsDisabled;
      // zoom B
      btnBUp.disabled = arrowsDisabled;
      btnBDown.disabled = arrowsDisabled;
      btnBLeft.disabled = arrowsDisabled;
      btnBRight.disabled = arrowsDisabled;
      // zoom B
      btnBZoomIn.disabled = arrowsDisabled;
      btnBZoomOut.disabled = arrowsDisabled;

      const hasNext = state.index >= 0 && state.index < state.history.length - 1;
      btnNew.textContent = hasNext ? "Next image" : "New image";
    }

    function showError(err) {
      console.error(err);
      setStatus("Error (see console)");
      metaEl.textContent = String(err?.message || err);
      metaEl.title = metaEl.textContent;
      state.busy = false;
      updateButtons();
    }

    async function saveImage() {
      if (!state.lastRender) return;

      const aPart = sanitizeFilenamePart(state.lastRender.a);
      const bPart = sanitizeFilenamePart(state.lastRender.b);
      const filename = `${aPart}__PLUS__${bPart}.png`;

      const srcW = canvas.width || 1;
      const srcH = canvas.height || 1;
      const longSide = Math.max(srcW, srcH);
      const scale = Math.min(1, MAX_SAVE_LONG_SIDE / longSide);

      // Export from a scaled offscreen canvas (only downsizes; never upsizes)
      const outCanvas = document.createElement("canvas");
      outCanvas.width = Math.max(1, Math.round(srcW * scale));
      outCanvas.height = Math.max(1, Math.round(srcH * scale));

      const outCtx = outCanvas.getContext("2d", { alpha: false });
      outCtx.imageSmoothingEnabled = true;
      outCtx.imageSmoothingQuality = "high";
      outCtx.fillStyle = "#111";
      outCtx.fillRect(0, 0, outCanvas.width, outCanvas.height);
      outCtx.drawImage(canvas, 0, 0, outCanvas.width, outCanvas.height);

      const blob = await new Promise((resolve) => outCanvas.toBlob(resolve, "image/png"));
      if (!blob) return;

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // Fetch an image and trigger download preserving the original file extension.
    async function saveSingleImage(url) {
      const normalized = normalizeImagePath(url);
      const base = sanitizeFilenamePart(normalized);
      const extMatch = String(normalized).match(/\.([a-z0-9]+)(?:[?#].*)?$/i);
      const ext = extMatch ? extMatch[1] : "bin";
      const filename = `${base}.${ext}`;

      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText} @ ${url}`);
      const blob = await res.blob();

      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(blobUrl);
    }

    // Save both images (A then B) as separate downloads.
    async function saveBothImages() {
      if (!state.lastRender) return;
      state.busy = true;
      updateButtons();
      try {
        // save A then B sequentially (less likely to be blocked by popup policies)
        await saveSingleImage(state.lastRender.a);
        await saveSingleImage(state.lastRender.b);
      } finally {
        state.busy = false;
        updateButtons();
      }
    }

    async function fetchJSON(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText} @ ${url}`);
      return res.json();
    }

    async function init() {
      setStatus("Loading manifest…");

      const manifest = await fetchJSON(MANIFEST_URL);
      if (!Array.isArray(manifest)) throw new Error("manifest.json must be a JSON array of image paths");

      state.allImages = manifest
        .filter((u) => typeof u === "string" && IMAGE_EXT_RE.test(u))
        .map(normalizeImagePath)
        .sort();

      if (state.allImages.length < 2) {
        throw new Error("Not enough images found in manifest.json (need at least 2)");
      }

      setStatus(`Found ${state.allImages.length} images`);

      // Ensure async handler errors are visible (prevents "silent fails")
      btnNew.onclick = () => newImage().catch(showError);
      btnPrev.onclick = () => prevImage().catch(showError);
      btnSave.onclick = () => saveImage().catch(showError);
      btnSaveBoth.onclick = () => saveBothImages().catch(showError);
      btnBatch.onclick = () => generateBatch().catch(showError);
      btnBackBatch.onclick = () => backToBatch();

      // A controls
      btnAUp.onclick = () => moveImage("a", 0, -MOVE_STEP).catch(showError);
      btnADown.onclick = () => moveImage("a", 0, MOVE_STEP).catch(showError);
      btnALeft.onclick = () => moveImage("a", -MOVE_STEP, 0).catch(showError);
      btnARight.onclick = () => moveImage("a", MOVE_STEP, 0).catch(showError);
      btnAZoomIn.onclick = () => zoomImage("a", ZOOM_STEP).catch(showError);
      btnAZoomOut.onclick = () => zoomImage("a", 1 / ZOOM_STEP).catch(showError);
      // B controls
      btnBUp.onclick = () => moveImage("b", 0, -MOVE_STEP).catch(showError);
      btnBDown.onclick = () => moveImage("b", 0, MOVE_STEP).catch(showError);
      btnBLeft.onclick = () => moveImage("b", -MOVE_STEP, 0).catch(showError);
      btnBRight.onclick = () => moveImage("b", MOVE_STEP, 0).catch(showError);
      btnBZoomIn.onclick = () => zoomImage("b", ZOOM_STEP).catch(showError);
      btnBZoomOut.onclick = () => zoomImage("b", 1 / ZOOM_STEP).catch(showError);

      // attach keyboard handler
      window.addEventListener("keydown", handleKeyDown, { passive: false });

      window.addEventListener("resize", () => fitCanvasCSS(), { passive: true });

      updateButtons();
      await newImage();
    }

    init().catch(showError);
  </script>
</body>

</html>
